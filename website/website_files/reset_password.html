<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AirNest – Reset Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="signup-page">

  <header class="signup-header">
    <h1>Air<span>Nest</span></h1>
  </header>

  <main class="signup-main">
    <div class="signup-card">

      <p class="signup-logo">Air<span>Nest</span></p>
      <h2 class="signup-title">Reset Password</h2>
      <p class="signup-subtitle">Enter and confirm your new password below.</p>

      <div id="reset-form">
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <input type="password" id="new-password" class="form-input"
            placeholder="At least 8 chars, one special character"
            oninput="validatePassword(this)" />
          <span class="form-error" id="new-password-error">Min. 8 characters and at least one special character.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-input"
            placeholder="Repeat your new password"
            oninput="validateConfirm(this)" />
          <span class="form-error" id="confirm-password-error">Passwords do not match.</span>
        </div>

        <button class="form-submit" onclick="handleReset()">Set New Password</button>
      </div>

      <!-- Shown after success or invalid token -->
      <div id="reset-message" style="display:none; text-align:center; padding: 1rem 0;">
        <p id="reset-message-text" style="color:var(--muted); font-size:0.95rem; line-height:1.7;"></p>
        <a href="index.html"
           style="display:inline-block;margin-top:1.25rem;color:var(--nav-bg);font-weight:600;text-decoration:none;">
          ← Back to Home
        </a>
      </div>

    </div>
  </main>

  <footer class="signup-page-footer">© 2026 AirNest</footer>

  <div id="toast-success" class="toast toast-success">
    <span class="toast-icon">✓</span>
    <span id="toast-success-msg">Password updated!</span>
  </div>
  <div id="toast-error" class="toast toast-error">
    <span class="toast-icon">✕</span>
    <span id="toast-error-msg">Something went wrong.</span>
  </div>

  <script>
    const API_BASE = window.location.port
      ? `${window.location.protocol}//${window.location.hostname}:${window.location.port}`
      : `${window.location.protocol}//${window.location.hostname}`;
    const specialCharRegex = /[!?#@$%^&*()\-_=+\[\]{};':"\\|,.<>`~]/;

    // Read the token from the URL: reset_password.html?token=abc123
    const token = new URLSearchParams(window.location.search).get('token');

    // If there's no token at all, show an error immediately
    if (!token) {
      document.getElementById('reset-form').style.display = 'none';
      const msg = document.getElementById('reset-message');
      msg.style.display = 'block';
      document.getElementById('reset-message-text').textContent =
        'This reset link is invalid or has expired. Please request a new one.';
    }

    function showToast(type, message) {
      if (message) document.getElementById('toast-' + type + '-msg').textContent = message;
      const toast = document.getElementById('toast-' + type);
      toast.classList.add('toast-visible');
      setTimeout(() => toast.classList.remove('toast-visible'), 5000);
    }

    function validatePassword(input) {
      const error = document.getElementById('new-password-error');
      const ok = input.value.length >= 8 && specialCharRegex.test(input.value);
      input.classList.toggle('form-input--error', input.value.length > 0 && !ok);
      error.classList.toggle('form-error--visible', input.value.length > 0 && !ok);
      const confirm = document.getElementById('confirm-password');
      if (confirm.value.length > 0) validateConfirm(confirm);
      return ok;
    }
    function validateConfirm(input) {
      const error = document.getElementById('confirm-password-error');
      const match = input.value === document.getElementById('new-password').value;
      input.classList.toggle('form-input--error', input.value.length > 0 && !match);
      error.classList.toggle('form-error--visible', input.value.length > 0 && !match);
      return match;
    }

    async function handleReset() {
      const passInput    = document.getElementById('new-password');
      const confirmInput = document.getElementById('confirm-password');

      const passOk    = validatePassword(passInput);
      const confirmOk = validateConfirm(confirmInput);

      if (passInput.value.length === 0) {
        passInput.classList.add('form-input--error');
        document.getElementById('new-password-error').classList.add('form-error--visible');
      }
      if (confirmInput.value.length === 0) {
        confirmInput.classList.add('form-input--error');
        document.getElementById('confirm-password-error').classList.add('form-error--visible');
      }

      if (!passOk || !confirmOk) return;

      try {
        const response = await fetch(`${API_BASE}/api/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: passInput.value })
        });
        const result = await response.json();

        if (result.success) {
          // Hide the form, show success message
          document.getElementById('reset-form').style.display = 'none';
          const msg = document.getElementById('reset-message');
          msg.style.display = 'block';
          document.getElementById('reset-message-text').textContent =
            'Your password has been updated. You can now log in with your new password.';
        } else {
          // Token expired or invalid — hide form, show error
          document.getElementById('reset-form').style.display = 'none';
          const msg = document.getElementById('reset-message');
          msg.style.display = 'block';
          document.getElementById('reset-message-text').textContent =
            result.error || 'This reset link is invalid or has expired. Please request a new one.';
        }
      } catch (err) {
        showToast('error', 'Could not reach the server. Please try again.');
      }
    }
  </script>

</body>
</html>
